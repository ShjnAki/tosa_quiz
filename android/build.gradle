// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.7.2'
        classpath 'com.google.gms:google-services:4.4.2'

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

apply from: "variables.gradle"

allprojects {
    repositories {
        google()
        mavenCentral()
    }

    // Depuis Kotlin 1.8, kotlin-stdlib-jdk7/jdk8 ont fusionné dans kotlin-stdlib.
    // Des dépendances transitives (cordova-android, androidx) tirent encore les
    // anciens artefacts jdk7/jdk8 en 1.6.21, ce qui crée des classes en double
    // (échec de checkDuplicateClasses). On les aligne sur 1.8.22 (stubs vides).
    configurations.all {
        resolutionStrategy.eachDependency { details ->
            if (details.requested.group == 'org.jetbrains.kotlin'
                    && (details.requested.name == 'kotlin-stdlib-jdk7'
                     || details.requested.name == 'kotlin-stdlib-jdk8')) {
                details.useVersion '1.8.22'
            }
        }
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
